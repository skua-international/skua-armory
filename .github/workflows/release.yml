name: Release

on:
  push:
    tags:
    - 'v*.*.*'

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout the source code
      uses: actions/checkout@v1

    - name: Set VERSION env
      run: echo VERSION=${GITHUB_REF:11} >> $GITHUB_ENV

    - name: Setup HEMTT
      uses: arma-actions/hemtt@v1
      with:
        annotate: false

    - name: Run HEMTT release
      run: hemtt release

    - name: Upload to Workshop
      uses: arma-actions/workshop-upload@v1
      with:
        appId: '107410'    # default
        itemId: '3680089530' # Id of item to update
        contentPath: '.hemttout/release'
        changelog: 'https://github.com/skua-international/skua-armory/releases/tag/v${{ env.VERSION }}' # set to github tag link
      env:
        STEAM_USERNAME: ${{ secrets.STEAM_USERNAME }}
        STEAM_PASSWORD: ${{ secrets.STEAM_PASSWORD }}
