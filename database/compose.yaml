name: skua_test_db
services:
  postgres:
    image: postgres:18
    restart: unless-stopped
    ports:
      - "0.0.0.0:55432:5432"
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: changeit
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U procyon"]
      interval: 10s
      timeout: 5s
      retries: 5
volumes:
  postgres_data: